<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Manche de Guitare</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E1208">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg: #0F0A04;
    --fretboard: #1E1208;
    --fret-color: #6B6560;
    --string-color: #B8943A;
    --tonic: #E84545;
    --third: #F59E0B;
    --fifth: #4CAF82;
    --other: #6B8FA8;
    --altered: #B06ED4;
    --text: #E8DCC8;
    --text-dim: #7A6E5E;
    --surface2: #261808;
    --border: #3A280F;
    --gold: #C8A84B;
    --gold-dim: rgba(200,168,75,0.15);
    --radius: 12px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --cell-w: 44px;
    --cell-h: 40px;
    --open-w: 24px;
    --name-w: 32px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font);
    min-height: 100dvh; display: flex; flex-direction: column;
    overflow-x: hidden; user-select: none;
  }

  header {
    padding: 12px 14px 8px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border); background: var(--fretboard);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.04em; color: var(--gold); text-transform: uppercase; flex: 1; }
  .header-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }

  .controls {
    padding: 10px 14px; display: flex; flex-direction: column; gap: 8px;
    background: var(--fretboard); border-bottom: 1px solid var(--border);
  }
  .control-row { display: flex; align-items: center; gap: 8px; }
  .control-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; min-width: 60px; }
  .pill-group { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
  .pill {
    padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: transparent; color: var(--text-dim);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .pill:active { transform: scale(0.94); }
  .pill.active-tonic { background: rgba(232,69,69,0.18); border-color: var(--tonic); color: var(--tonic); }
  .pill.active-mode  { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
  .toggle-group { display: flex; gap: 4px; }
  .toggle-btn {
    padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: transparent; color: var(--text-dim);
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .toggle-btn.active { background: var(--surface2); border-color: var(--gold); color: var(--gold); }
  .fret-count-row { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .fret-count-btn {
    width: 26px; height: 26px; border-radius: 7px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); font-size: 16px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; line-height: 1;
  }
  .fret-count-btn:active { transform: scale(0.9); }
  .fret-count-val { font-size: 13px; font-weight: 700; color: var(--gold); min-width: 22px; text-align: center; }

  .fretboard-wrapper {
    overflow-x: auto; padding: 0;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .fretboard-wrapper::-webkit-scrollbar { display: none; }
  .fretboard { display: inline-flex; flex-direction: column; padding: 8px 16px 8px 8px; min-width: max-content; }

  .num-row { display: flex; align-items: center; height: 18px; }
  .num-spacer { width: var(--name-w); flex-shrink: 0; }
  .num-open  { width: var(--open-w); flex-shrink: 0; text-align: center; font-size: 9px; color: var(--text-dim); }
  .num-cell  { width: var(--cell-w); flex-shrink: 0; text-align: center; font-size: 9px; color: var(--text-dim); }
  .num-cell.dot-fret { color: var(--gold); font-weight: 700; }

  .string-row { display: flex; align-items: center; height: var(--cell-h); position: relative; }
  .sname { width: var(--name-w); flex-shrink: 0; text-align: center; font-size: 11px; font-weight: 700; color: var(--text-dim); }

  .string-wire {
    position: absolute; left: var(--name-w); right: 0; top: 50%;
    pointer-events: none; z-index: 0;
    background: linear-gradient(to right, var(--string-color), rgba(184,148,58,0.3));
  }
  .string-row[data-string="0"] .string-wire { height: 3px; margin-top: -1.5px; }
  .string-row[data-string="1"] .string-wire { height: 2.5px; margin-top: -1.25px; }
  .string-row[data-string="2"] .string-wire { height: 2px; margin-top: -1px; }
  .string-row[data-string="3"] .string-wire { height: 1.5px; margin-top: -0.75px; }
  .string-row[data-string="4"] .string-wire { height: 1.2px; margin-top: -0.6px; }
  .string-row[data-string="5"] .string-wire { height: 1px; margin-top: -0.5px; }

  .nut {
    width: var(--open-w); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
    border-right: 3px solid #9A8A70; height: 100%;
  }
  .fcell {
    width: var(--cell-w); flex-shrink: 0; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1; cursor: pointer;
  }
  .fcell::after {
    content: ''; position: absolute; right: 0; top: 4px; bottom: 4px; width: 2px;
    background: linear-gradient(to bottom, transparent, var(--fret-color) 30%, var(--fret-color) 70%, transparent);
    pointer-events: none;
  }
  .fcell.sel { background: rgba(200,168,75,0.07); }

  /* Note dots — taille réduite si altération pour loger le symbole */
  .ndot {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; transition: transform 0.15s;
    position: relative; z-index: 2; letter-spacing: -0.02em;
  }
  .ndot.small { width: 34px; height: 28px; border-radius: 14px; font-size: 9.5px; }
  .ndot:active { transform: scale(1.15); }
  .ndot.hidden { visibility: hidden; }
  .ndot.r-tonic  { background: var(--tonic);   color: #fff;    box-shadow: 0 0 10px rgba(232,69,69,0.6); }
  .ndot.r-third  { background: var(--third);   color: #1A1100; box-shadow: 0 0 8px rgba(245,158,11,0.5); }
  .ndot.r-fifth  { background: var(--fifth);   color: #0A1A12; box-shadow: 0 0 8px rgba(76,175,130,0.5); }
  .ndot.r-other  { background: var(--other);   color: #fff;    box-shadow: 0 0 6px rgba(107,143,168,0.4); }
  .ndot.r-altered{ background: var(--altered); color: #fff;    box-shadow: 0 0 8px rgba(176,110,212,0.5); }

  .inlay-row { display: flex; align-items: center; height: 16px; }
  .inlay-spacer { width: var(--name-w); flex-shrink: 0; }
  .inlay-open   { width: var(--open-w); flex-shrink: 0; }
  .inlay-cell   { width: var(--cell-w); flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .idot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); opacity: 0.35; }

  .fret-panel { margin: 10px 14px; border-radius: var(--radius); background: var(--surface2); border: 1px solid var(--border); overflow: hidden; }
  .fret-panel.hidden { display: none; }
  .fp-header {
    padding: 9px 14px; background: rgba(200,168,75,0.08); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .fp-title { font-size: 12px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; }
  .fp-close {
    width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); font-size: 14px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .fp-table { width: 100%; border-collapse: collapse; }
  .fp-table th {
    padding: 6px 12px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); text-align: left; font-weight: 600; border-bottom: 1px solid var(--border);
  }
  .fp-table td { padding: 7px 12px; font-size: 13px; font-weight: 600; border-bottom: 1px solid rgba(58,40,15,0.5); }
  .fp-table tr:last-child td { border-bottom: none; }
  .deg-badge { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 22px; border-radius: 11px; font-size: 10px; font-weight: 700; }
  .db-1 { background: rgba(232,69,69,0.25); color: var(--tonic); }
  .db-3 { background: rgba(245,158,11,0.25); color: var(--third); }
  .db-5 { background: rgba(76,175,130,0.25); color: var(--fifth); }
  .db-o { background: rgba(107,143,168,0.15); color: var(--other); }
  .db-a { background: rgba(176,110,212,0.2); color: var(--altered); }

  .legend { display: flex; gap: 12px; padding: 6px 14px 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-dim); }
  .ldot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .ldot.tonic   { background: var(--tonic); }
  .ldot.third   { background: var(--third); }
  .ldot.fifth   { background: var(--fifth); }
  .ldot.other   { background: var(--other); }
  .ldot.altered { background: var(--altered); }

  .scroll-hint { text-align: right; font-size: 9px; color: var(--text-dim); padding: 4px 14px 0; opacity: 0.5; letter-spacing: 0.05em; }
</style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
    <path d="M20 4C20 4 16 2 12 2C8 2 4 6 4 10C4 13 5.5 15 7 16.5L5 21L7 22L9 18.5C10 19.2 11 19.5 12 19.5C16 19.5 20 15.5 20 11V4Z" stroke="#C8A84B" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="9" cy="12" r="1.5" fill="#C8A84B"/>
  </svg>
  <div><h1>Manche</h1><div class="header-sub">Explorateur de guitare</div></div>
</header>

<div class="controls">
  <div class="control-row">
    <span class="control-label">Tonique</span>
    <div class="pill-group" id="tonic-pills">
      <button class="pill active-tonic" data-note="Do">Do</button>
      <button class="pill" data-note="Ré">Ré</button>
      <button class="pill" data-note="Mi">Mi</button>
      <button class="pill" data-note="Fa">Fa</button>
      <button class="pill" data-note="Sol">Sol</button>
      <button class="pill" data-note="La">La</button>
      <button class="pill" data-note="Si">Si</button>
    </div>
  </div>
  <div class="control-row">
    <span class="control-label">Mode</span>
    <div class="pill-group" id="mode-pills">
      <button class="pill active-mode" data-mode="single">Note</button>
      <button class="pill" data-mode="major-triad">Triade maj.</button>
      <button class="pill" data-mode="minor-triad">Triade min.</button>
      <button class="pill" data-mode="penta-major">Penta maj.</button>
      <button class="pill" data-mode="penta-minor">Penta min.</button>
    </div>
  </div>
  <div class="control-row">
    <span class="control-label">Affichage</span>
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn-notes">Notes</button>
      <button class="toggle-btn" id="btn-degrees">Degrés</button>
    </div>
    <div class="fret-count-row">
      <button class="fret-count-btn" id="fret-less">−</button>
      <span class="fret-count-val" id="fret-val">12</span>
      <button class="fret-count-btn" id="fret-more">+</button>
      <span class="control-label" style="min-width:auto">frets</span>
    </div>
  </div>
</div>

<div class="scroll-hint">← faites défiler →</div>
<div class="fretboard-wrapper">
  <div class="fretboard" id="fretboard"></div>
</div>

<div class="legend" id="legend">
  <div class="legend-item"><span class="ldot tonic"></span><span id="lg1">Tonique</span></div>
  <div class="legend-item" id="lg3w"><span class="ldot third"></span><span id="lg3">Tierce</span></div>
  <div class="legend-item" id="lg5w"><span class="ldot fifth"></span><span id="lg5">Quinte</span></div>
  <div class="legend-item" id="lgOw" style="display:none"><span class="ldot other"></span><span id="lgO">Autres</span></div>
  <div class="legend-item" id="lgAw" style="display:none"><span class="ldot altered"></span><span>Altérations</span></div>
</div>

<div class="fret-panel hidden" id="fret-panel">
  <div class="fp-header">
    <span class="fp-title" id="fp-title">Frette 5</span>
    <button class="fp-close" id="fp-close">×</button>
  </div>
  <table class="fp-table">
    <thead><tr>
      <th>Corde</th><th>Note</th>
      <th id="fp-deg-th" style="display:none">Degré</th>
    </tr></thead>
    <tbody id="fp-body"></tbody>
  </table>
</div>

<script>
// ── THÉORIE ───────────────────────────────────────────────────────────────────

// Chaque demi-ton → [nom_diese, nom_bemol]
const NOTE_NAMES = [
  ['Do',  'Do' ],   // 0
  ['Do#', 'Ré♭'],  // 1
  ['Ré',  'Ré' ],   // 2
  ['Ré#', 'Mi♭'],  // 3
  ['Mi',  'Mi' ],   // 4
  ['Fa',  'Fa' ],   // 5
  ['Fa#', 'Sol♭'], // 6
  ['Sol', 'Sol'],   // 7
  ['Sol#','La♭'],  // 8
  ['La',  'La' ],   // 9
  ['La#', 'Si♭'],  // 10
  ['Si',  'Si' ],   // 11
];

// Modes qui préfèrent les bémols
const FLAT_MODES = new Set(['minor-triad','penta-minor']);

// Intervalles exacts (demi-tons) pour chaque mode
const MODE_INTERVALS = {
  'single':       [0],
  'major-triad':  [0,4,7],
  'minor-triad':  [0,3,7],
  'penta-major':  [0,2,4,7,9],
  'penta-minor':  [0,3,5,7,10],
};

// Étiquettes de degrés
const MODE_DEG = {
  'single':       ['1'],
  'major-triad':  ['1','3','5'],
  'minor-triad':  ['1','3m','5'],
  'penta-major':  ['1','2','3','5','6'],
  'penta-minor':  ['1','3m','4','5','7m'],
};

// Rôle couleur par degré
const DEG_ROLE = {'1':'tonic','3':'third','3m':'third','5':'fifth'};

// Cordes en demi-tons (Mi grave=index 0)
const OPEN  = [4,9,2,7,11,4];
const SNAMES = ['Mi','La','Ré','Sol','Si','Mi'];
const ROW_ORDER = [5,4,3,2,1,0]; // affichage: Mi aigu en haut, Mi grave en bas

const INLAY_SINGLE = new Set([3,5,7,9,15,17,19,21]);
const INLAY_DOUBLE = new Set([12,24]);

const NATURALS = ['Do','Ré','Mi','Fa','Sol','La','Si'];
const NATURAL_SEMI = [0,2,4,5,7,9,11];

// ── STATE ─────────────────────────────────────────────────────────────────────
let S = { tonic:'Do', mode:'single', display:'notes', frets:12, selFret:null };

// ── HELPERS ───────────────────────────────────────────────────────────────────

// Nom d'une note selon demi-ton + préférence modale
function noteName(semi, mode) {
  const useFlat = FLAT_MODES.has(mode);
  return NOTE_NAMES[((semi % 12) + 12) % 12][useFlat ? 1 : 0];
}

// En mode "note seule", on n'affiche que les notes naturelles
function isNatural(semi) {
  return NATURAL_SEMI.includes(((semi % 12) + 12) % 12);
}

// Calcule les demi-tons absolus des notes de la gamme pour la tonique+mode choisis
function getScaleSemitones() {
  const tonicSemi = NATURAL_SEMI[NATURALS.indexOf(S.tonic)];
  return (MODE_INTERVALS[S.mode] || [0]).map(i => (tonicSemi + i) % 12);
}

// Trouve le rôle d'un demi-ton dans la gamme courante
// Retourne null si la note n'est pas dans la gamme
function getSemiRole(semi) {
  const s = ((semi % 12) + 12) % 12;
  const scale = getScaleSemitones();
  const pos = scale.indexOf(s);
  if (pos < 0) return null;
  const deg = MODE_DEG[S.mode][pos];
  return { deg, role: DEG_ROLE[deg] || 'other' };
}

// Note à une frette donnée pour une corde donnée
function noteAtFret(strIdx, fret) {
  const semi = (OPEN[strIdx] + fret) % 12;
  return semi;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() { buildFretboard(); buildLegend(); buildPanel(); }

function buildNumRow() {
  const row = document.createElement('div');
  row.className = 'num-row';
  row.innerHTML = `<div class="num-spacer"></div><div class="num-open">0</div>`;
  for (let f = 1; f <= S.frets; f++) {
    const d = document.createElement('div');
    d.className = 'num-cell' + (INLAY_SINGLE.has(f)||INLAY_DOUBLE.has(f) ? ' dot-fret' : '');
    d.textContent = f;
    row.appendChild(d);
  }
  return row;
}

function buildInlayRow() {
  const row = document.createElement('div');
  row.className = 'inlay-row';
  row.innerHTML = `<div class="inlay-spacer"></div><div class="inlay-open"></div>`;
  for (let f = 1; f <= S.frets; f++) {
    const cell = document.createElement('div');
    cell.className = 'inlay-cell';
    if (INLAY_DOUBLE.has(f)) {
      cell.innerHTML = '<div class="idot"></div><div class="idot"></div>';
    } else if (INLAY_SINGLE.has(f)) {
      cell.innerHTML = '<div class="idot"></div>';
    }
    row.appendChild(cell);
  }
  return row;
}

function makeDot(semi) {
  const dot = document.createElement('div');
  const isSingleMode = S.mode === 'single';

  if (isSingleMode) {
    // Mode note seule : uniquement les notes naturelles de la tonique
    const tonicSemi = NATURAL_SEMI[NATURALS.indexOf(S.tonic)];
    if (semi !== tonicSemi) { dot.className = 'ndot hidden'; return dot; }
    dot.className = 'ndot r-tonic';
    dot.textContent = S.display === 'notes' ? noteName(semi, S.mode) : '1';
    return dot;
  }

  // Modes gamme/triade : cherche si ce demi-ton est dans la gamme
  const role = getSemiRole(semi);

  if (!role) {
    dot.className = 'ndot hidden';
    return dot;
  }

  const name = noteName(semi, S.mode);
  const isAlt = !isNatural(semi); // note altérée (dièse ou bémol)

  let cls;
  if (isAlt) {
    cls = 'r-altered'; // toujours violet si altération, peu importe le degré
  } else {
    cls = role.role === 'tonic' ? 'r-tonic'
        : role.role === 'third' ? 'r-third'
        : role.role === 'fifth' ? 'r-fifth' : 'r-other';
  }

  // Forme ovale pour les noms longs (Mi♭, Ré#, Sol#…)
  const isLong = name.length > 2;
  dot.className = `ndot ${cls}${isLong ? ' small' : ''}`;
  dot.textContent = S.display === 'notes' ? name : role.deg;
  return dot;
}

function buildFretboard() {
  const fb = document.getElementById('fretboard');
  fb.innerHTML = '';
  fb.appendChild(buildNumRow());

  ROW_ORDER.forEach(si => {
    const row = document.createElement('div');
    row.className = 'string-row';
    row.dataset.string = si;

    const sn = document.createElement('div');
    sn.className = 'sname';
    sn.textContent = SNAMES[si];
    row.appendChild(sn);

    const wire = document.createElement('div');
    wire.className = 'string-wire';
    row.appendChild(wire);

    // Corde à vide (frette 0)
    const nut = document.createElement('div');
    nut.className = 'nut';
    nut.appendChild(makeDot(noteAtFret(si, 0)));
    nut.addEventListener('click', () => toggleFret(0));
    row.appendChild(nut);

    // Frettes 1..N
    for (let f = 1; f <= S.frets; f++) {
      const cell = document.createElement('div');
      cell.className = 'fcell' + (S.selFret === f ? ' sel' : '');
      cell.appendChild(makeDot(noteAtFret(si, f)));
      cell.addEventListener('click', () => toggleFret(f));
      row.appendChild(cell);
    }

    fb.appendChild(row);
  });

  fb.appendChild(buildInlayRow());
  fb.appendChild(buildNumRow());
}

function buildLegend() {
  const scale = getScaleSemitones();
  const degs  = MODE_DEG[S.mode];

  document.getElementById('lg1').textContent = `${S.tonic} (1)`;

  if (scale.length > 1) {
    document.getElementById('lg3').textContent = `${noteName(scale[1], S.mode)} (${degs[1]})`;
    document.getElementById('lg3w').style.display = '';
  } else { document.getElementById('lg3w').style.display = 'none'; }

  if (scale.length > 2) {
    document.getElementById('lg5').textContent = `${noteName(scale[2], S.mode)} (${degs[2]})`;
    document.getElementById('lg5w').style.display = '';
  } else { document.getElementById('lg5w').style.display = 'none'; }

  // Autres notes (penta)
  if (scale.length > 3) {
    const others = scale.slice(3).map((s,i) => `${noteName(s,S.mode)}(${degs[i+3]})`).join(' ');
    document.getElementById('lgO').textContent = others;
    document.getElementById('lgOw').style.display = '';
  } else { document.getElementById('lgOw').style.display = 'none'; }

  // Altérations présentes ?
  const hasAltered = scale.some(s => !isNatural(s));
  document.getElementById('lgAw').style.display = hasAltered ? '' : 'none';
}

function buildPanel() {
  const panel = document.getElementById('fret-panel');
  if (S.selFret === null) { panel.classList.add('hidden'); return; }
  panel.classList.remove('hidden');
  document.getElementById('fp-title').textContent =
    S.selFret === 0 ? 'Cordes à vide' : `Frette ${S.selFret}`;

  const hasDeg = S.mode !== 'single';
  document.getElementById('fp-deg-th').style.display = hasDeg ? '' : 'none';

  const tbody = document.getElementById('fp-body');
  tbody.innerHTML = '';

  [0,1,2,3,4,5].forEach(si => {
    const semi = noteAtFret(si, S.selFret);
    const role = getSemiRole(semi);
    const name = noteName(semi, S.mode);
    const isAlt = !isNatural(semi);
    const tr = document.createElement('tr');

    const tdS = document.createElement('td');
    tdS.style.cssText = 'color:var(--text-dim);font-size:11px';
    tdS.textContent = SNAMES[si];
    tr.appendChild(tdS);

    const tdN = document.createElement('td');
    let col = 'var(--text)';
    if (role) {
      col = isAlt ? 'var(--altered)'
          : role.role === 'tonic' ? 'var(--tonic)'
          : role.role === 'third' ? 'var(--third)'
          : role.role === 'fifth' ? 'var(--fifth)' : 'var(--other)';
    }
    tdN.innerHTML = `<span style="color:${role ? col : 'var(--text-dim)'}; opacity:${role?1:0.35}">${name}</span>`;
    tr.appendChild(tdN);

    if (hasDeg) {
      const tdD = document.createElement('td');
      if (role) {
        const dcls = isAlt ? 'db-a'
                   : role.role==='tonic'?'db-1':role.role==='third'?'db-3':role.role==='fifth'?'db-5':'db-o';
        tdD.innerHTML = `<span class="deg-badge ${dcls}">${role.deg}</span>`;
      } else {
        tdD.innerHTML = '<span style="color:var(--text-dim);font-size:11px">–</span>';
      }
      tr.appendChild(tdD);
    }
    tbody.appendChild(tr);
  });
}

function toggleFret(f) {
  S.selFret = S.selFret === f ? null : f;
  render();
  if (S.selFret !== null) {
    setTimeout(() => document.getElementById('fret-panel')
      .scrollIntoView({ behavior:'smooth', block:'nearest' }), 50);
  }
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('tonic-pills').addEventListener('click', e => {
  const b = e.target.closest('[data-note]'); if (!b) return;
  S.tonic = b.dataset.note;
  document.querySelectorAll('#tonic-pills .pill').forEach(p => p.classList.remove('active-tonic'));
  b.classList.add('active-tonic');
  render();
});
document.getElementById('mode-pills').addEventListener('click', e => {
  const b = e.target.closest('[data-mode]'); if (!b) return;
  S.mode = b.dataset.mode;
  document.querySelectorAll('#mode-pills .pill').forEach(p => p.classList.remove('active-mode'));
  b.classList.add('active-mode');
  render();
});
document.getElementById('btn-notes').addEventListener('click', () => {
  S.display = 'notes';
  document.getElementById('btn-notes').classList.add('active');
  document.getElementById('btn-degrees').classList.remove('active');
  render();
});
document.getElementById('btn-degrees').addEventListener('click', () => {
  S.display = 'degrees';
  document.getElementById('btn-degrees').classList.add('active');
  document.getElementById('btn-notes').classList.remove('active');
  render();
});
document.getElementById('fret-less').addEventListener('click', () => {
  if (S.frets > 6) { S.frets--; document.getElementById('fret-val').textContent = S.frets; render(); }
});
document.getElementById('fret-more').addEventListener('click', () => {
  if (S.frets < 24) { S.frets++; document.getElementById('fret-val').textContent = S.frets; render(); }
});
document.getElementById('fp-close').addEventListener('click', () => { S.selFret = null; render(); });

// ── INIT ──────────────────────────────────────────────────────────────────────
render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
</body>
</html>
